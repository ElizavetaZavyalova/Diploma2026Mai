version: "3.9"
name: "Diploma"

services:

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: always
    command: >
      redis-server --appendonly yes --requirepass pass
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "pass", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse
    environment:
      CLICKHOUSE_DB: etl_data
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 2181"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "bash", "-c", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      retries: 15

  flink-jobmanager:
    build:
      context: .
      dockerfile: flink/flink.dockerfile
    container_name: flink-jobmanager
    command: jobmanager
    volumes:
      - ./flink/app:/opt/flink/etl
    ports:
      - "8081:8081"
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/overview"]
      interval: 10s
      timeout: 5s
      retries: 15

  flink-taskmanager:
    build:
      context: .
      dockerfile: flink/flink.dockerfile
    container_name: flink-taskmanager
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://flink-jobmanager:8081/overview"]
      interval: 10s
      timeout: 5s
      retries: 15

  gui_service:
    container_name: gui_service
    build:
      context: .
      dockerfile: gui_service/gui_service.dockerfile
    ports:
      - "8083:8083"
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      PORT_FAST_API: 8083
      HOST_FAST_API: "0.0.0.0"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: pass
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  raspberry_service:
    container_name: raspberry_service
    build:
      context: .
      dockerfile: raspberry_service/rustberi_service.dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      PORT_FAST_API: 8082
      HOST_FAST_API: "0.0.0.0"
      BOOTSTRAP_SERVER: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: pass
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  raspberry-pi1:
    container_name: rp1
    depends_on:
      raspberry_service:
        condition: service_healthy
    build:
      context: .
      dockerfile: rustberi_emulator/emulate.dockerfile
    environment:
      SERVER_URL: "http://raspberry_service:8082"
      DEVICE_ID: "mai-1"

volumes:
  redis_data:
  clickhouse_data: